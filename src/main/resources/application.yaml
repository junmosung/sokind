spring:
  application:
    name: chat-demo
  datasource:
    url: jdbc:postgresql://localhost:5432/chat
    username: chat
    password: chat
    hikari:
      # 부하 테스트 후 조정 — 현재는 짧은 burst 워크로드 기준 합리적 기본값.
      maximum-pool-size: 20
      minimum-idle: 5
      # 획득 실패는 빠르게 5xx로 → 클라 백오프 유도 (장애 격리).
      connection-timeout: 3000
      validation-timeout: 2000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null    # 응답 페이로드 축소.

server:
  port: 8080
  shutdown: graceful

chat:
  snapshot:
    # snapshot 생성 임계치(이벤트 수). 작을수록 복원 빠름·쓰기 비용 ↑.
    interval-events: 50

logging:
  level:
    root: INFO
    me.victor.demo: DEBUG
    org.springframework.web.socket: INFO
